<div class="auth-container">

  <h2>Forgot Password</h2>

  <form (ngSubmit)="submit()" novalidate>

    <!-- Email Field -->
    <div class="field">
      <label for="resetEmail">Email Address</label>

      <input
        id="resetEmail"
        type="email"
        name="email"
        [(ngModel)]="email"
        placeholder="Enter your email"
        required
        autocomplete="email"
      />
    </div>

    <!-- Submit Button -->
    <button
      type="submit"
      [disabled]="loading"
    >
      {{ loading ? 'Sending...' : 'Send Reset Link' }}
    </button>

  </form>

  <!-- Success Message -->
  <p class="success" *ngIf="message">
    {{ message }}
  </p>

  <!-- Error Message -->
  <p class="error" *ngIf="error">
    {{ error }}
  </p>

</div>
