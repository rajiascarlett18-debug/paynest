<div class="auth-container">

  <h2>Forgot Password</h2>

  <form (ngSubmit)="submit()" #forgotForm="ngForm" novalidate>

    <!-- Email Field -->
    <div class="field">
      <label for="resetEmail">Email Address</label>

      <input
        id="resetEmail"
        type="email"
        name="email"
        [(ngModel)]="email"
        #emailModel="ngModel"
        placeholder="Enter your email"
        required
        email
        autocomplete="email"
      />

      <!-- Validation Errors -->
      <small class="error" *ngIf="emailModel.invalid && emailModel.touched">
        <span *ngIf="emailModel.errors?.['required']">
          Email is required
        </span>
        <span *ngIf="emailModel.errors?.['email']">
          Please enter a valid email
        </span>
      </small>
    </div>

    <!-- Submit Button -->
    <button
      type="submit"
      [disabled]="loading || forgotForm.invalid"
    >
      {{ loading ? 'Sending...' : 'Send Reset Link' }}
    </button>

  </form>

  <!-- Success Message -->
  <p class="success" *ngIf="message">
    {{ message }}
  </p>

  <!-- Error Message -->
  <p class="error" *ngIf="error">
    {{ error }}
  </p>

</div>
