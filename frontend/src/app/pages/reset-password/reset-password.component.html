<div class="auth-container">

  <h2>Reset Password</h2>

  <form (ngSubmit)="submit()" novalidate autocomplete="on">

    <!-- ================= NEW PASSWORD ================= -->
    <div class="field">
      <label for="newPassword">New Password</label>

      <input
        id="newPassword"
        name="newPassword"
        type="password"
        [(ngModel)]="newPassword"
        placeholder="Create a new password"
        autocomplete="new-password"
        required
      />
    </div>

    <!-- ================= CONFIRM PASSWORD ================= -->
    <div class="field">
      <label for="confirmPassword">Confirm Password</label>

      <input
        id="confirmPassword"
        name="confirmPassword"
        type="password"
        [(ngModel)]="confirmPassword"
        placeholder="Re-enter your new password"
        autocomplete="new-password"
        required
      />
    </div>

    <!-- ================= BUTTON ================= -->
    <button
      type="submit"
      [disabled]="loading"
      class="btn-primary"
    >
      {{ loading ? 'Resetting...' : 'Reset Password' }}
    </button>

  </form>

  <!-- ================= SUCCESS MESSAGE ================= -->
  <p class="success" *ngIf="message" role="alert">
    {{ message }}
  </p>

  <!-- ================= ERROR MESSAGE ================= -->
  <p class="error" *ngIf="error" role="alert">
    {{ error }}
  </p>

</div>
